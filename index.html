<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factoring Practice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero card">
      <h1>Factoring Practice</h1>
      <p class="subtle">Practice factoring polynomials — GCF, difference of squares, and more.</p>
    </header>

    <section class="card controls-card">
      <div class="controls-grid">
        <div class="field">
          <label for="methodSelect">Method</label>
          <select id="methodSelect">
            <option value="gcf">GCF</option>
            <option value="dos">Difference of Squares</option>
            <option value="pst">Perfect Square Trinomial</option>
            <option value="st">Simple Trinomial</option>
            <option value="grouping">Grouping</option>
          </select>
        </div>

        <div class="field">
          <label for="difficultySelect">Proficiency</label>
          <select id="difficultySelect">
            <option value="emerging">Emerging</option>
            <option value="developing">Developing</option>
            <option value="proficient">Proficient</option>
            <option value="extending">Extending</option>
          </select>
        </div>

        <div class="field">
          <label for="modeSelect">Mode</label>
          <select id="modeSelect">
            <option value="final">Final answer</option>
            <option value="guided">Guided steps</option>
          </select>
        </div>

        <div class="field button-field">
          <button id="generateBtn">Generate Problem</button>
          <button id="copyLinkBtn" class="secondary" style="display:none">Copy Link</button>
        </div>
      </div>
    </section>

    <section class="sticky-problem-wrap">
      <div class="sticky-problem card">
        <div class="sticky-label">Factor this polynomial:</div>
        <div id="problemDisplay" class="math-display">Press Generate Problem</div>
      </div>
    </section>

    <main class="main-layout">
      <section class="card work-card">
        <div id="workArea"></div>

        <div id="feedbackBox" class="feedback info">Generate a problem to start.</div>
      </section>

      <section class="card steps-card">
        <h2>Solution Steps</h2>
        <div id="stepsOutput" class="steps-output">
          <p class="subtle">The saved factoring steps will appear here when requested.</p>
        </div>
      </section>
    </main>
  </div>

  <section class="sticky-keypad-wrap">
    <div class="sticky-keypad card">
      <div class="keypad-status" id="keypadStatus">Tap an answer field, then use the keypad.</div>
      <div class="keypad-dock-actions" id="keypadDockActions">
        <button id="dockCheckBtn">Check</button>
        <button id="dockHintBtn">Hint</button>
        <button id="dockSolveBtn">Solve Step</button>
        <button id="dockShowSolutionBtn">Show Solution</button>
      </div>
      <div class="keypad-grid" id="keypadGrid"></div>
    </div>
  </section>

  <script src="utils.js"></script>
  <script src="generators.js"></script>
  <script src="input.js"></script>
  <script src="render.js"></script>
  <script src="app.js"></script>
</body>
</html>
